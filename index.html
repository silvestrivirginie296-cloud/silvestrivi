<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afternoon Sun - Cozy & Calming</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #FAF9F6; 
            overflow: hidden;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #5C4D42; 
        }
        .sunlight {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px); 
            opacity: 0.6;
            z-index: 1;
            animation: float 12s infinite alternate ease-in-out;
        }
        .light-peach {
            width: 400px;
            height: 400px;
            background: #FFE5D9; 
            top: -10%;
            left: 10%;
        }
        .light-yellow {
            width: 500px;
            height: 500px;
            background: #FFF1E6; 
            bottom: -15%;
            right: 5%;
            animation-delay: -5s;
        }
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 40px) scale(1.1); }
        }

        /* Glassmorphism card */
        .card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.9); 
            border-radius: 30px; 
            padding: 60px 80px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(139, 115, 85, 0.08); 
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 45px rgba(139, 115, 85, 0.12);
        }
        h1 {
            margin: 0 0 15px 0;
            font-size: 2.8rem;
            font-weight: 500;
            color: #4A3F35; 
            letter-spacing: 2px;
        }
        p {
            color: #8D7B68; 
            font-size: 1.15rem;
            margin-bottom: 40px;
            letter-spacing: 1px;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            padding: 14px 40px;
            font-size: 1.05rem;
            color: #FAF9F6;
            background: #D4A373; 
            border-radius: 40px; 
            text-decoration: none;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            box-shadow: 0 8px 20px rgba(212, 163, 115, 0.3);
            font-weight: bold;
            cursor: pointer; 
        }

        .btn:hover {
            background: #C89564; 
            transform: scale(1.03);
            box-shadow: 0 10px 25px rgba(212, 163, 115, 0.4);
        }
    </style>
</head>
<body>
    
    <div class="sunlight light-peach"></div>
    <div class="sunlight light-yellow"></div>

    <div class="card">
        <h1>Peaceful Moments</h1>
        <p>A warm cup of tea, a good book.<br>Enjoy your cozy afternoon.</p>
        <a href="javascript:void(0);" class="btn">Embrace Peace</a>
    </div>

</body>
</html>
